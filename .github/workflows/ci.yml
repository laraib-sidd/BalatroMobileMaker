name: CI Build Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore and build CLI
        run: dotnet build src/BalatroMobile.Cli/BalatroMobile.Cli.csproj --configuration Release

      - name: Restore and build GUI
        run: dotnet build src/BalatroMobile.Gui/BalatroMobile.Gui.csproj --configuration Release

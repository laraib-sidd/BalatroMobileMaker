name: CI Build Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write  # Required to create tags

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for tag checking

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore and build CLI
        run: dotnet build src/BalatroMobile.Cli/BalatroMobile.Cli.csproj --configuration Release

      - name: Restore and build GUI
        run: dotnet build src/BalatroMobile.Gui/BalatroMobile.Gui.csproj --configuration Release

  # Create tag and trigger release after successful build on main
  create-release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from Program.cs
        id: get_version
        shell: pwsh
        run: |
          $content = Get-Content "src/BalatroMobile.Cli/Program.cs" -Raw
          if ($content -match 'private const string Version = "([^"]+)"') {
            $version = $matches[1]
            Write-Host "Found version: $version"
            echo "version=$version" >> $env:GITHUB_OUTPUT
          } else {
            Write-Error "Could not find version in Program.cs"
            exit 1
          }

      - name: Check if tag already exists
        id: check_tag
        shell: bash
        run: |
          if git tag -l "v${{ steps.get_version.outputs.version }}" | grep -q .; then
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.check_tag.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.get_version.outputs.version }}" -m "Release v${{ steps.get_version.outputs.version }}"
          git push origin "v${{ steps.get_version.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

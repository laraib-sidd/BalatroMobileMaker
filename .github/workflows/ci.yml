name: CI Build Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write  # Required to create tags

jobs:
  build:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      should_release: ${{ steps.check_release.outputs.should_release }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for tag checking

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from Program.cs
        id: get_version
        shell: pwsh
        run: |
          $content = Get-Content "src/BalatroMobile.Cli/Program.cs" -Raw
          if ($content -match 'private const string Version = "([^"]+)"') {
            $version = $matches[1]
            Write-Host "Found version: $version"
            echo "version=$version" >> $env:GITHUB_OUTPUT
          } else {
            Write-Error "Could not find version in Program.cs"
            exit 1
          }

      - name: Check if should create release
        id: check_release
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.version }}"
          $tagName = "v$version"
          
          # Check if this is a push to main (not a PR)
          $isPush = "${{ github.event_name }}" -eq "push"
          $isMain = "${{ github.ref }}" -eq "refs/heads/main"
          
          # Check if tag already exists
          $tagExists = git tag -l $tagName
          
          if ($isPush -and $isMain -and -not $tagExists) {
            Write-Host "Will create release for $tagName"
            echo "should_release=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "Skipping release (isPush=$isPush, isMain=$isMain, tagExists=$tagExists)"
            echo "should_release=false" >> $env:GITHUB_OUTPUT
          }

      - name: Restore dependencies
        run: dotnet restore src/BalatroMobile.Cli/BalatroMobile.Cli.csproj

      - name: Build
        run: dotnet build src/BalatroMobile.Cli/BalatroMobile.Cli.csproj --configuration Release --no-restore

      - name: Test publish (verify single-file build works)
        run: |
          dotnet publish src/BalatroMobile.Cli/BalatroMobile.Cli.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            --output ./test-release

      - name: Verify EXE created
        run: |
          if (Test-Path ./test-release/BalatroMobile.exe) {
            Write-Host "Build successful! EXE size: $((Get-Item ./test-release/BalatroMobile.exe).Length / 1MB) MB"
          } else {
            Write-Error "BalatroMobile.exe not found!"
            exit 1
          }

  # Create tag and trigger release after successful build on main
  create-release:
    needs: build
    if: needs.build.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ needs.build.outputs.version }}" -m "Release v${{ needs.build.outputs.version }}"
          git push origin "v${{ needs.build.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
